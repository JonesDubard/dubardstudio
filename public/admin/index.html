<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Dubard Studio — Content Manager</title>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.0.0/dist/decap-cms.min.js"></script>
  <script>
    (function init() {
      if (typeof DecapCMS !== 'undefined') {
        DecapCMS.init({ config: '/admin/config.yml' });
      } else {
        setTimeout(init, 300);
      }
    })();
  </script>
</body>
