backend:
  name: github
  repo: JonesDubard/dubardstudio   # ← REPLACE with your GitHub username/repo
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

# Enable local_backend for development (run `npx decap-server` alongside `next dev`)
# local_backend: true

collections:
  # ─── SITE SETTINGS ───────────────────────────────────────
  - name: settings
    label: Site Settings
    files:
      - name: general
        label: General Settings
        file: content/settings.json
        fields:
          - { label: "Site Title", name: siteTitle, widget: string }
          - { label: "Tagline", name: tagline, widget: string }
          - { label: "Hero Headline", name: heroHeadline, widget: string }
          - { label: "Hero Sub-headline", name: heroSubheadline, widget: text }
          - { label: "Email", name: email, widget: string }
          - { label: "WhatsApp Number (international format, e.g. +2319000000)", name: whatsapp, widget: string }
          - { label: "Location", name: location, widget: string }
          - { label: "GitHub URL", name: github, widget: string, required: false }
          - { label: "LinkedIn URL", name: linkedin, widget: string, required: false }
          - { label: "Profile Photo", name: profilePhoto, widget: image }
          - { label: "Hero Mockup Image", name: heroImage, widget: image, required: false }
          - { label: "About Bio (Paragraph 1)", name: aboutPara1, widget: text }
          - { label: "About Bio (Paragraph 2)", name: aboutPara2, widget: text, required: false }
          - { label: "CV/Resume File (PDF)", name: cvFile, widget: file, required: false }

  # ─── PROJECTS ────────────────────────────────────────────
  - name: projects
    label: Projects
    folder: content/projects
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Title", name: title, widget: string }
      - { label: "Short Description (1–2 sentences)", name: description, widget: text }
      - { label: "Timeline / Date (e.g. Jan 2024 – Mar 2024)", name: timeline, widget: string }
      - { label: "Category", name: category, widget: select, options: ["Web Design", "Development", "WordPress", "QA", "Brand Identity"] }
      - { label: "Live URL", name: url, widget: string }
      - { label: "Screenshot", name: image, widget: image }
      - { label: "Featured?", name: featured, widget: boolean, default: false }
      - { label: "Sort Order (lower = first)", name: order, widget: number, default: 99 }
      - { label: "Technologies Used (comma-separated)", name: tech, widget: string, required: false }

  # ─── TESTIMONIALS ────────────────────────────────────────
  - name: testimonials
    label: Testimonials
    folder: content/testimonials
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: name, widget: string }
      - { label: "Role / Company", name: role, widget: string, required: false }
      - { label: "Quote", name: quote, widget: text }
      - { label: "Client Photo", name: photo, widget: image, required: false }
      - { label: "Sort Order", name: order, widget: number, default: 99 }

  # ─── SERVICES ────────────────────────────────────────────
  - name: services
    label: Services
    files:
      - name: services_list
        label: Services List
        file: content/services.json
        fields:
          - label: Services
            name: services
            widget: list
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Tagline", name: tagline, widget: string }
              - { label: "Icon (filename in /public/images/icons/)", name: icon, widget: string }
              - label: Sub-services
                name: items
                widget: list
                field: { label: Item, name: item, widget: string }
