[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify Identity — required for Decap CMS auth
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# Redirect /success for Netlify Forms
[[redirects]]
  from = "/success"
  to = "/success"
  status = 200
